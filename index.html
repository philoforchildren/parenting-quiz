<body>

<div class="container">

  <!-- Brand -->
  <div class="brand-tag">小朱媽媽的哲學飯桌</div>

  <!-- Start Screen -->
  <div id="startScreen" class="start-screen">
    <h1 class="hero-title">你是哪種教養風格的家長？</h1>
    <p class="hero-subtitle">
      六個日常場景，六個直覺反應。<br>
      沒有對錯，只有誠實的自己。<br>
      測驗結束，你會看見自己的教養本能從哪裡長出來。
    </p>

    <div class="card visible" style="margin-bottom: 32px; padding: 28px 32px;">
      <p style="font-family: 'Noto Sans TC', sans-serif; font-size: 14px; line-height: 1.9; color: var(--brown-mid);">
        選擇最接近「你實際會說或會做的」那個選項。<br>不是你覺得「應該這樣做」的那個。
      </p>
    </div>

    <button class="start-btn" onclick="startQuiz()">開始測驗 →</button>
    <p class="intro-note">約 2 分鐘完成・共 6 題</p>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" style="display:none;">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">第 1 題，共 6 題</div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="card" id="quizCard">
      <div class="q-number" id="qNumber">Q1</div>
      <div class="q-text" id="qText"></div>
      <div class="q-context" id="qContext"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="next-wrap">
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
          下一題
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="resultScreen" class="result-screen">
    <div class="card visible">
      <div class="result-type-label">你的教養風格</div>
      <div class="result-type-name" id="resultName"></div>
      <div class="result-tagline" id="resultTagline"></div>
      <div class="result-body" id="resultBody"></div>

      <div class="result-strength">
        <div class="result-strength-label">你的核心優勢</div>
        <p id="resultStrength"></p>
      </div>

      <div class="type-bars" id="typeBars"></div>

      <div class="result-next">
        <div class="result-next-label">如果你想走得更遠</div>
        <p id="resultNext"></p>
      </div>

      <div class="ornament">✦ ✦ ✦</div>

      <button class="cta-btn" onclick="goToBrand()">認識哲學飯桌 →</button>

  <div class="footer">© 小朱媽媽的哲學飯桌</div>

<script>
const questions = [
  {
    text: "孩子哭著說「你都偏心弟弟，這樣不公平！」",
    context: "你剛買了弟弟需要的新鞋，哥哥沒有。",
    options: [
      { text: "「有嗎？我對你們都一樣！我哪有偏心？」", type: "A" },
      { text: "「我說過了，誰需要就買給誰，這是家裡的規定。」", type: "B" },
      { text: "「你最近是不是覺得媽媽比較少陪你？」先抱抱他。", type: "C" },
      { text: "「你說的不公平，是指大家拿到的東西要一樣，還是大家都拿到需要的？」", type: "D" }
    ]
  },
  {
    text: "孩子作業拖到晚上十點還沒寫完，你怎麼辦？",
    context: "這不是第一次了。你已經提醒了三次。",
    options: [
      { text: "忍不住了，開始提高音量催促：「你到底什麼時候要開始！」", type: "A" },
      { text: "執行之前說好的後果：「說好的，沒寫完不能看電視。」", type: "B" },
      { text: "先坐下來問他：「今天學校發生什麼事了嗎？你看起來很累。」", type: "C" },
      { text: "「你是卡在不知道怎麼寫，還是你根本不想寫？我想搞清楚是哪個問題。」", type: "D" }
    ]
  },
  {
    text: "你發現孩子說謊騙了你，你最在乎的是什麼？",
    context: "他說作業寫完了，其實根本沒寫。",
    options: [
      { text: "他竟然騙我，氣到心臟痛。「你敢騙媽媽！」", type: "A" },
      { text: "「說謊就是不對，有什麼後果就要承擔什麼後果。」", type: "B" },
      { text: "「你為什麼不敢跟我說真話？是媽媽讓你覺得說真的很危險嗎？」", type: "C" },
      { text: "「說謊通常是在保護什麼。你在怕什麼？」", type: "D" }
    ]
  },
  {
    text: "孩子考試成績出來，比上次退步很多。",
    context: "他自己也知道考不好，回來就沉默著。",
    options: [
      { text: "「你最近到底都在做什麼！這樣怎麼行！」", type: "A" },
      { text: "「這次退步了，下次要更認真，要不要我們來排讀書計畫？」", type: "B" },
      { text: "什麼都先不說，走過去摸摸他的頭：「辛苦了，要不要先吃點東西？」", type: "C" },
      { text: "「你自己覺得這次哪裡出了問題？不是在問答案，我想聽你的判斷。」", type: "D" }
    ]
  },
  {
    text: "手足兩個人為了同一個玩具吵得不可開交。",
    context: "一個哭、一個大叫，你剛剛才下班回家。",
    options: [
      { text: "「夠了！都給我進房間，誰都不准玩！」", type: "A" },
      { text: "「輪流用，每個人十五分鐘，從弟弟先開始。」", type: "B" },
      { text: "先蹲下來抱住哭得比較厲害的那個，讓他感覺到你在。", type: "C" },
      { text: "「我想知道你們兩個覺得，什麼方法是你們都能接受的？你們自己來想。」", type: "D" }
    ]
  },
  {
    text: "孩子說：「讀書有什麼用？以後 AI 都會做了。」",
    context: "你沉默了三秒。然後你說——",
    options: [
      { text: "「你不讀書以後要幹嘛！說這種話！」", type: "A" },
      { text: "「讀書是你現在的責任，該做的事還是要做。」", type: "B" },
      { text: "「你是不是對學校有點倦了？最近讀起來很有壓力嗎？」", type: "C" },
      { text: "「你說的有用是什麼意思？你覺得讀書應該要能做到什麼？」", type: "D" }
    ]
  }
];

const results = {
  A: {
    name: "情緒先行型",
    tagline: "你的愛是真的，工具還在路上",

let currentQ = 0;
let answers = [];
let selectedOption = null;

function startQuiz() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  document.getElementById('progressWrap').classList.add('visible');
  showQuestion(0);
}

function showQuestion(index) {
  const card = document.getElementById('quizCard');
  card.classList.remove('visible');

  setTimeout(() => {
    const q = questions[index];
    document.getElementById('qNumber').textContent = `Q${index + 1}`;
    document.getElementById('qText').textContent = q.text;
    document.getElementById('qContext').textContent = q.context;
    document.getElementById('progressLabel').textContent = `第 ${index + 1} 題，共 ${questions.length} 題`;
    document.getElementById('progressFill').style.width = `${(index / questions.length) * 100}%`;

    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    const letters = ['A', 'B', 'C', 'D'];

    q.options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="option-letter">${letters[i]}.</span>${opt.text}`;
      btn.dataset.type = opt.type;
      btn.onclick = () => selectOption(btn, opt.type);
      container.appendChild(btn);
    });

    const nextBtn = document.getElementById('nextBtn');
    nextBtn.classList.remove('active');
    nextBtn.textContent = index === questions.length - 1 ? '看結果' : '下一題';
    if (index < questions.length - 1) {
      nextBtn.innerHTML = `下一題 <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    } else {
      nextBtn.innerHTML = `看我的結果 <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    }

    selectedOption = null;
    card.classList.add('visible');
  }, 200);
}

function selectOption(btn, type) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = type;
  document.getElementById('nextBtn').classList.add('active');
}

function nextQuestion() {
  if (!selectedOption) return;
  answers.push(selectedOption);
  currentQ++;

  if (currentQ >= questions.length) {
    showResult();
  } else {
    showQuestion(currentQ);
  }
}

function showResult() {
  document.getElementById('quizScreen').style.display = 'none';
  document.getElementById('progressWrap').classList.remove('visible');

  const counts = { A: 0, B: 0, C: 0, D: 0 };
  answers.forEach(a => counts[a]++);

  const dominant = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
  const result = results[dominant];

  document.getElementById('resultName').textContent = result.name;
  document.getElementById('resultTagline').textContent = result.tagline;
  document.getElementById('resultBody').innerHTML = result.body.replace(/\n\n/g, '<br><br>');
  document.getElementById('resultStrength').textContent = result.strength;
  document.getElementById('resultNext').textContent = result.next;
  document.getElementById('ctaText').textContent = result.cta;

  // Type bars
  const typeLabels = { A: '情緒先行', B: '規則優先', C: '關係守護', D: '哲學導航' };
  const barsHtml = Object.entries(counts).map(([type, count]) => {
    const pct = Math.round((count / questions.length) * 100);
    const isDom = type === dominant;
    return `
      <div class="type-bar-row">
        <div class="type-bar-label">${typeLabels[type]}</div>
        <div class="type-bar-track">
          <div class="type-bar-fill ${isDom ? 'dominant' : ''}" data-pct="${pct}"></div>
        </div>
        <div class="type-bar-pct">${pct}%</div>
      </div>
    `;
  }).join('');
  document.getElementById('typeBars').innerHTML = barsHtml;

  const rs = document.getElementById('resultScreen');
  rs.classList.add('visible');

  // Animate bars after a tick
  setTimeout(() => {
    document.querySelectorAll('.type-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 100);

  // Update progress bar to full
  document.getElementById('progressFill').style.width = '100%';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToBrand() {
  // 小朱媽媽的哲學飯桌 FB 粉專
  window.open('https://www.facebook.com/profile.php?id=61577476978719&locale=zh_TW', '_blank');
}

function resetQuiz() {
  currentQ = 0;
  answers = [];
  selectedOption = null;
  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('startScreen').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
